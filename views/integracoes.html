
      <!-- ── Integrações: GitHub ──────────────────────────── -->

        <div class="integ-wrap">

          <!-- Status / conexão -->

            <div class="integ-head">
              <div class="integ-gh-logo">
                <svg width="34" height="34" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .5C5.7.5.5 5.7.5 12c0 5.1 3.3 9.4 7.9 10.9.6.1.8-.2.8-.5v-1.7c-3.2.7-3.9-1.5-3.9-1.5-.5-1.3-1.3-1.7-1.3-1.7-1-.7.1-.7.1-.7 1.2.1 1.8 1.2 1.8 1.2 1 1.8 2.7 1.3 3.4 1 .1-.8.4-1.3.7-1.6-2.6-.3-5.3-1.3-5.3-5.7 0-1.3.5-2.3 1.2-3.1-.1-.3-.5-1.5.1-3.1 0 0 1-.3 3.3 1.2a11.5 11.5 0 0 1 6 0C17 4.6 18 4.9 18 4.9c.6 1.6.2 2.8.1 3.1.8.8 1.2 1.8 1.2 3.1 0 4.4-2.7 5.4-5.3 5.7.4.4.8 1.1.8 2.2v3.3c0 .3.2.6.8.5 4.6-1.5 7.9-5.8 7.9-10.9C23.5 5.7 18.3.5 12 .5z"/></svg>
              </div>
              <div class="integ-head-info">
                <h3>Integração com GitHub</h3>
                <p>Conecte sua conta do GitHub para vincular repositórios aos projetos e receber eventos automaticamente.</p>
              </div>
              <span class="integ-status" id="integ-status"><span class="integ-status-dot"></span><span id="integ-status-text">Carregando...</span></span>
            </div>
            <div class="integ-actions">
              <button class="btn-primary" id="integ-connect-btn" type="button">Conectar GitHub</button>
              <span class="integ-hint" id="integ-hint"></span>
            </div>
          </div>

          <!-- Repositórios + vínculo com projeto -->
          <div class="integ-card">
            <div class="integ-card-title">Repositórios disponíveis</div>
            <div id="integ-repos-list" class="integ-repos"></div>

            <div class="integ-link-row">
              <select id="integ-link-project" class="kanban-select"></select>
              <select id="integ-link-repo" class="kanban-select"></select>
              <button class="btn-secondary" id="integ-link-btn" type="button">Vincular ao projeto</button>
            </div>

            <div class="integ-links" id="integ-links-list"></div>
          </div>

          <!-- Eventos recebidos -->
          <div class="integ-card">
            <div class="integ-card-title">Últimos eventos recebidos</div>
            <div id="integ-events-list" class="integ-events"></div>
          </div>

        </div>
      </section>
